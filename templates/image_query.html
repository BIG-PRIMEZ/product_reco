<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Query Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Handwritten Query Search</h1>
            <p class="subtitle">Upload handwritten text for OCR extraction and search</p>
        </header>

        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/text-query">Text Query</a></li>
                <li><a href="/image-query" class="active">Handwritten Query</a></li>
                <li><a href="/product-upload">Product Image</a></li>
            </ul>
        </nav>

        <form id="searchForm">
            <div class="form-group">
                <label for="imageFile">Upload handwritten query image:</label>
                <input type="file" id="imageFile" name="image_data" accept="image/*" required>
            </div>

            <div class="image-preview" id="previewContainer" style="display: none;">
                <h4 style="margin-bottom: 10px;">Image Preview:</h4>
                <img id="imagePreview" src="" alt="Preview">
            </div>

            <button type="submit" id="submitBtn">Extract Text & Search</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing image and searching...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="response-box" style="background: #fff3e0; border-left-color: #ff9800;">
                <h3>Extracted Text (OCR)</h3>
                <p class="response-text" id="extractedText" style="font-family: monospace; font-size: 1.1em; font-weight: 600;"></p>
            </div>

            <div class="response-box">
                <h3>Search Results</h3>
                <p class="response-text" id="responseText"></p>
            </div>

            <h3>Products Found</h3>
            <table class="products-table" id="productsTable">
                <thead>
                    <tr>
                        <th>Stock Code</th>
                        <th>Description</th>
                        <th>Unit Price</th>
                        <th>Country</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Image preview
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Form submission
        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('imageFile');
            const file = fileInput.files[0];

            if (!file) {
                document.getElementById('error').textContent = 'Please select an image file.';
                document.getElementById('error').classList.add('show');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const error = document.getElementById('error');

            // Reset UI
            results.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            submitBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('image_data', file);

                const response = await fetch('/ocr-query', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // Extract OCR text from response
                    const responseText = data.response;
                    const match = responseText.match(/Extracted query: '([^']+)'/);
                    const extractedText = match ? match[1] : 'Text extraction successful';

                    document.getElementById('extractedText').textContent = extractedText;
                    document.getElementById('responseText').textContent = data.response;

                    // Display products
                    const tbody = document.getElementById('productsBody');
                    tbody.innerHTML = '';

                    if (data.products && data.products.length > 0) {
                        data.products.forEach(product => {
                            const row = tbody.insertRow();
                            row.innerHTML = `
                                <td>${product.StockCode}</td>
                                <td>${product.Description}</td>
                                <td>${product.UnitPrice}</td>
                                <td>${product.Country}</td>
                            `;
                        });
                        results.classList.add('show');
                    } else {
                        error.textContent = 'No products found. Please try a different image.';
                        error.classList.add('show');
                    }
                } else {
                    error.textContent = data.response || 'An error occurred while processing the image.';
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = 'Network error. Please check your connection and try again.';
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
